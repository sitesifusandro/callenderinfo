<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Kings&display=swap" rel="stylesheet">
<style>

.count-down-window{
margin-top: 14px; width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 1rem; border-radius: .375rem; background-color: rgba(0, 0, 0, 0.48); padding-bottom: 6px; padding-top: .25rem; position: relative;
}
    #countdown {
      display: flex; font-size: 20px; position: relative; margin: 0 auto; justify-content: center; gap: 0.6rem;
}
    
.time-box {
       padding: 5px; text-align: center;  min-width: 56px; font-weight:500;font-style: italic;
    }
    .time-box .label {
      font-size: 0.6em; color: #A0A0A0; filter: brightness(1.1); margin-top: 5px; display: block; font-weight: 600;
    }
#days, #minutes, #seconds {
  color: #fff; font-size: 2.1rem; font-weight: 700; font-style: italic;background-color: #a8a3a31c; border-radius: 10px;
}
#hours  {
 color: #fff;font-size: 2.1rem; font-weight: 700; font-style: italic;background-color: #a8a3a31c;  border-radius: 10px;
}


</style>
</head>

<body style="background: black;">
<div style="padding:10px; width:100%; max-width:476px; margin:0 auto;">
<div class="es3" style="margin-bottom: 20px;">
<h1 style="text-align: center;font-size: 78px;font-weight: 700;color: white; font-family: 'Kings', serif;">
I <span style="text-shadow: 1.5px 1.5px 0 white;margin: 0 4px 0px 4px;font-size: 78px;position: relative;color:red;">S</span>
<span style="color:yellow;">B</span></h1>
<div class="subtekst" style="color: white;font-size: 0.9em;text-align: center;margin-top: -83px;letter-spacing: 1px; font-style: italic;margin-bottom: -22px;">International 
                     <span  style="color:red;text-shadow: 0.2px 0.2px white;">Seminar </span>
                 <span style="color:yellow;">Brussels</span></div>
</div>

<h2 style="color: white;font-family: times new roman, serif;font-weight: 700;font-style: italic;text-align: center;font-size: clamp(32px, 10vw, 52px);margin-bottom: 10px;">6 7 8 November 2026 </h2>

<div class="count-down-window">

       <div id="countdown">

        <div class="time-box">
         <div id="days">184</div>
          <span class="label">Days</span>
        </div>

        <div class="time-box">
         <div id="hours">0</div>
          <span class="label">Hours</span>
        </div>

        <div class="time-box">
         <div id="minutes">9</div>
          <span class="label">Minutes</span>
        </div>

        <div class="time-box">
         <div id="seconds">27</div>
          <span class="label">Seconds</span>
        </div>

       </div>
      </div>




</div>


 <script>
    // Einddatum instellen (bijvoorbeeld 1 januari 2026 om 00:00)
    const targetDate = new Date("2026-11-06T09:00:00+01:00").getTime();

    const timer = setInterval(function () {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      // Waarden updaten in de HTML
      document.getElementById("days").innerText = days;
      document.getElementById("hours").innerText = hours;
      document.getElementById("minutes").innerText = minutes;
      document.getElementById("seconds").innerText = seconds;

      // Stoppen wanneer countdown klaar is
      if (distance < 0) {
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "<div>You missed the start… maybe not the ending!</div>";
      }
    }, 1000);
  </script>


</body>
</html>
