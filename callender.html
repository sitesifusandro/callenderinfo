<script>
const notesData = JSON.parse(document.getElementById("notitiesData").textContent);

const card = document.getElementById('calendarCard');
const calendarContent = document.getElementById('calendarMonthContent');
const backNotes = document.getElementById('backNotes');
const monthLabel = document.getElementById('monthLabel');

const months = [
  "January", "February", "March", "April", "May", "June",
  "July", "August", "September", "October", "November", "December"
];
const weekdays = ["M", "T", "W", "T", "F", "S", "S"];
let currentMonth = new Date().getMonth();
let year = new Date().getFullYear();




function getNotesArray(dateStr) {
  const rawData = notesData[dateStr];
  if (!rawData) return [];

  if (Array.isArray(rawData)) return rawData;

  const [title, note] = rawData.split("::").map(s => s.trim());
  return [{ title: title || "", note: note || "" }];
}






function flipCard() {
  card.classList.toggle("flipped");
  if (card.classList.contains("flipped")) {
    loadBackNotes();
  }
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) {
    currentMonth = 11;
    year--;
  }
  renderCalendar();
}

function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) {
    currentMonth = 0;
    year++;
  }
  renderCalendar();
}

function renderCalendar() {
  const firstDay = new Date(year, currentMonth, 1).getDay();
  const daysInMonth = new Date(year, currentMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, currentMonth, 0).getDate();

  monthLabel.textContent = `${months[currentMonth]} ${year}`;

  let html = "<table><tr>";
  weekdays.forEach(day => {
    html += `<th>${day}</th>`;
  });
  html += "</tr><tr>";

  const startDay = firstDay === 0 ? 6 : firstDay - 1;
  let day = 1;
  let nextMonthDay = 1;

  for (let i = 0; i < 42; i++) {
    let cellDay, cellMonth = currentMonth, cellYear = year;
    let classes = [];
    
    // Bepaal welke dag dit is (vorige maand, huidige maand, volgende maand)
    if (i < startDay) {
      // Vorige maand
      cellDay = daysInPrevMonth - startDay + i + 1;
      cellMonth = currentMonth - 1;
      if (cellMonth < 0) {
        cellMonth = 11;
        cellYear--;
      }
      classes.push("other-month");
    } else if (day <= daysInMonth) {
      // Huidige maand
      cellDay = day;
      day++;
    } else {
      // Volgende maand
      cellDay = nextMonthDay++;
      cellMonth = currentMonth + 1;
      if (cellMonth > 11) {
        cellMonth = 0;
        cellYear++;
      }
      classes.push("other-month");
    }

    const dateStr = `${cellYear}-${String(cellMonth + 1).padStart(2, '0')}-${String(cellDay).padStart(2, '0')}`;

    // Weekenden markeren
    if (i % 7 === 5 || i % 7 === 6) classes.push("weekend");

    // Controleer of het vandaag is
    const today = new Date();
    const isToday = 
      cellDay === today.getDate() &&
      cellMonth === today.getMonth() &&
      cellYear === today.getFullYear();

    if (isToday) classes.push("today");

    // Event-dag markeren
    let dotColor = "";
const notesArray = getNotesArray(dateStr);
if (notesArray.length > 0) {
  classes.push("event-day");

  const note = notesArray[0].note.toLowerCase();

      if (note.includes("#groenblauw")) {
      dotColor = "linear-gradient(to right, rgba(0,255,0,1) 45%, rgba(0,147,255,1) 45%)";
}
      else if (note.includes("#groen")) dotColor = "rgba(0, 255, 0, 1)";
      else if (note.includes("#rood")) dotColor = "rgba(255, 0, 0, 1)";
      else if (note.includes("#geel")) dotColor = "rgba(255, 255, 0, 1)";
      else if (note.includes("#blauw")) dotColor = "rgba(0, 191, 255, 1)";
      else if (note.includes("#wit")) dotColor = "rgba(255, 255, 255, 1)";
      else if (note.includes("#paars")) dotColor = "rgba(236, 4, 232, 1)";
    }

    html += `<td class="${classes.join(' ')}" ${isToday ? `data-day="${cellDay}"` : ""}>
               <div style="display:flex; flex-direction:column; align-items:center;">
                 <div class="day-cell">${cellDay}</div>
                 ${dotColor ? `<div style="width:18px; height:7px; border-radius:50%; background:${dotColor}; position:absolute; bottom:2px;"></div>` : ""}
               </div>
             </td>`;

    if ((i + 1) % 7 === 0 && i < 41) html += "</tr><tr>";
  }

  html += "</tr></table>";
  calendarContent.innerHTML = html;
}





function loadBackNotes() {
  backNotes.innerHTML = "";
  let foundNotes = false;

  const sortedDates = Object.keys(notesData).sort((a, b) => new Date(a) - new Date(b));
  const today = new Date();
  let upcomingNoteId = null;

  for (const date of sortedDates) {
    const d = new Date(date);
    const noteMonth = d.getMonth();

    if (d.getFullYear() === year && noteMonth === currentMonth) {
      foundNotes = true;
      const day = d.getDate();
      const rawData = notesData[date];

      // Kleur bepalen (zoals je al had)
      const sampleNote = Array.isArray(rawData) ? rawData[0].note : rawData;
      const colorMatch = sampleNote.match(/#(groenblauw|groen|rood|geel|blauw|wit|paars)/i);
      let dateBgColor = "";
      let dateTextColor = "#fff";
      let dateBorder = "1px solid #000";

      if (colorMatch) {
        const kleur = colorMatch[1].toLowerCase();
        switch (kleur) {
          case "groenblauw": dateBgColor = "linear-gradient(to right, rgba(0,255,0,0.5), rgba(0,147,255,0.6))"; break;
          case "groen": dateBgColor = "rgba(0, 255, 0, 0.6)"; break;
          case "rood": dateBgColor = "rgba(255, 0, 0, 0.6)"; break;
          case "geel": dateBgColor = "rgba(255, 255, 0, 0.6)"; dateTextColor = "#232227"; break;
          case "blauw": dateBgColor = "rgba(0, 191, 255, 0.6)"; break;
          case "wit": dateBgColor = "rgba(255, 255, 255, 0.8)"; dateTextColor = "#232227"; break;
          case "paars": dateBgColor = "rgba(236, 4, 232, 0.6)"; break;
        }
      }

      // Bepaal of rawData een array is (meerdere events) of string (enkel)
      const notesArray = Array.isArray(rawData) ? rawData : [{ title: rawData.split("::")[0], note: rawData.split("::")[1] || "" }];

      // Voeg alle notes toe voor deze dag
      notesArray.forEach((event, index) => {
        const noteText = (event.note || "").replace(/#(groenblauw|groen|rood|geel|blauw|wit|paars)/gi, "").trim();
        const noteId = `note-${date}-${index}`;

        const dayName = d.toLocaleDateString("en-GB", { weekday: "long" });

        backNotes.innerHTML += `
          <div class="note" id="${noteId}" style="margin-bottom: 10px;">
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
              <strong style="
                background: ${dateBgColor};
                color: ${dateTextColor};
                padding: 4px 6px;
                border-radius: 4px;
                display: inline-block;
                border: ${dateBorder};
              ">
                ${day} ${months[noteMonth]}
              </strong>
              <span style="font-weight: 400; color: #FFF; line-height: 1; padding-bottom: 10px;">${dayName}</span>
            </div>
            <div style="margin-top: 4px;">${event.title}<br>${noteText.replace(/\n/g, "<br>")}</div>
          </div>`;
      });

      if (!upcomingNoteId && d >= today) {
        upcomingNoteId = `note-${date}-0`;
      }
    }
  }

  setTimeout(() => {
    let targetNote = null;
    if (upcomingNoteId) {
      targetNote = document.getElementById(upcomingNoteId);
    } else {
      const notes = backNotes.querySelectorAll(".note");
      if (notes.length > 0) {
        targetNote = notes[notes.length - 1];
      }
    }

    if (targetNote) {
      // Safari fix: alleen de container laten scrollen
      backNotes.scrollTo({
        top: targetNote.offsetTop,
        behavior: "smooth"
      });
    }
  }, 100);

  if (!foundNotes) {
    backNotes.innerHTML = `<p><em>Nog geen notities voor ${months[currentMonth]}</em></p>`;
  }
}

function updateTodayEvent() {
  const today = new Date();
  const day = today.getDate();
  const month = today.getMonth();
  const year = today.getFullYear();

  document.getElementById("date").textContent = day;
  document.getElementById("month").textContent = months[month];
  document.getElementById("day").textContent = today.toLocaleDateString('en-GB', { weekday: 'long' });

  const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
  const todayEventDiv = document.getElementById("today-event");

  let eventText = "No Seminar";
  let bgGradient = "#434343"; // default
  let textColor = "white";

const rawData = notesData[dateStr];

if (rawData) {

  const notesArray = Array.isArray(rawData)
    ? rawData
    : [{
        title: rawData.split("::")[0]?.trim() || "",
        note: rawData.split("::")[1]?.trim() || ""
      }];

  // Titels tonen
  eventText = notesArray
    .map(ev => ev.title)
    .filter(Boolean)
    .join("<br><br>");

  // Kleur zoeken in ALLE notes
  let combinedText = notesArray
    .map(ev => ev.note || "")
    .join(" ")
    .toLowerCase();

  const colorsFound = [];

  if (combinedText.includes("#groenblauw")) {
    colorsFound.push("rgba(0,255,0,0.5)", "rgba(0,124,255,1)");
  }
  if (combinedText.includes("#groen")) colorsFound.push("rgba(0,255,0,0.6)");
  if (combinedText.includes("#rood")) colorsFound.push("rgba(255,0,0,0.6)");
  if (combinedText.includes("#geel")) colorsFound.push("rgba(255,255,0,0.6)");
  if (combinedText.includes("#blauw")) colorsFound.push("rgba(0,191,255,0.6)");
  if (combinedText.includes("#wit")) colorsFound.push("rgba(255,255,255,0.8)");
  if (combinedText.includes("#paars")) colorsFound.push("rgba(236,4,232,0.6)");

  if (colorsFound.length === 1) {
    bgGradient = colorsFound[0];
  } else if (colorsFound.length > 1) {
    bgGradient = `linear-gradient(to right, ${colorsFound[0]} 0%, ${colorsFound[1]} 100%)`;
  }

  if (combinedText.includes("#wit")) {
    textColor = "#232227";
  }
}

  todayEventDiv.innerHTML = `
    <div style="font-size: 16px; font-weight: 600; height:31px; width:125px; border-radius: 5px; background:#323131; position: absolute; color: #fff; padding: 6px 0 3px 0; left: 0; right: 0; margin: 0 auto">
      Today
    </div>
    <div style="font-size: 14px; font-weight: 600; background:#434141; width: 125px; height:175px; padding-top: 40px; position: relative; border-radius: 5px; z-index: -1; text-align:center; margin: 12px auto; color: ${textColor};">
      ${eventText}
      <div style="width: 80px; height: 14px; background: ${bgGradient}; border-radius: 50%; position: absolute; left: 20px; bottom: 10px;"></div>
    </div>
  `;
}

document.addEventListener("DOMContentLoaded", () => {
  renderCalendar();
  updateTodayEvent();

  // Initiele dag/maand tekst
  const today = new Date();
  const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
  const monthNames = [
    "January", "February", "March", "April", "May", "June",
    "July", "August", "September", "October", "November", "December"
  ];

  document.getElementById("day").textContent = dayNames[today.getDay()];
  document.getElementById("date").textContent = today.getDate();
  document.getElementById("month").textContent = `${monthNames[today.getMonth()]} ${today.getFullYear()}`;
});
